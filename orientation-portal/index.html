<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veritas University Orientation Portal</title>
</head>
<body>

    <form action="/submit" method="post"> <fieldset>
            <legend>Student Orientation Registration</legend>

            <label for="fullname">Full Name: </label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required><br><br>

            <label for="matric">Matriculation Number: </label>
            <input type="text" id="matric" name="matric" placeholder="Enter your Matric Number" required><br><br>

            <label for="email">Email: </label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="age">Age: </label>
            <input type="number" id="age" name="age"><br><br>

            <label for="dob">Date of Birth: </label>
            <input type="date" id="dob" name="dob"><br><br>

            <p>Gender:</p>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label><br><br>

            <label for="faculty">Faculty: </label>
            <select id="faculty" name="faculty">
                <option value="science">Science</option>
                <option value="arts">Arts</option>
                <option value="management">Management Sciences</option>
            </select><br><br>

            <p>Documents Submitted:</p>
            <input type="checkbox" id="admission" name="docs" value="Admission Letter">
            <label for="admission">Admission Letter</label>
            <input type="checkbox" id="receipt" name="docs" value="Payment Receipt">
            <label for="receipt">Payment Receipt</label><br><br>

            <label for="passport">Upload Passport:</label>
            <input type="file" id="passport" name="passport"><br><br>

            <label for="message">Additional Information: </label><br>
            <textarea id="message" name="message" rows="4" cols="40"></textarea><br><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </fieldset>
    </form>

</body>
</html>
